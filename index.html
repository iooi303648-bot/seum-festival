<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동일중앙초 세움학교 페스티벌</title>
    <!-- 라이브러리 로드 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; background-color: #F0F2F5; overflow: hidden; }
        /* 원래 규격(1280x720)으로 복구 */
        .slide-aspect { aspect-ratio: 16 / 9; }
        .fade-in { animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(1.02); } to { opacity: 1; transform: scale(1); } }
        
        /* 교표 배경 제거 및 최적화 */
        .school-logo-img {
            mix-blend-mode: multiply;
            filter: contrast(1.1) brightness(1.05);
        }

        /* AI 로딩 바 애니메이션 */
        .ai-shimmer {
            background: linear-gradient(90deg, #0064E0 0%, #4a90e2 50%, #0064E0 100%);
            background-size: 200% 100%;
            animation: ai-shimmer 1.5s infinite linear;
        }
        @keyframes ai-shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* 사진 박스 스타일 (70% 사이즈 적용을 위한 트랜지션) */
        .photo-box {
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Gemini API 설정
        const apiKey = ""; 

        const callGemini = async (prompt, systemInstruction = "") => {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemInstruction }] }
            };
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                return result.candidates?.[0]?.content?.parts?.[0]?.text;
            } catch (error) {
                console.error("Gemini API Error", error);
                return null;
            }
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                left: <path d="m15 18-6-6 6-6"/>,
                right: <path d="m9 18 6-6-6-6"/>,
                play: <path d="m7 4 12 8-12 8V4z"/>,
                camera: (
                    <>
                        <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/>
                        <circle cx="12" cy="13" r="3"/>
                    </>
                ),
                volume2: (
                    <>
                        <path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 10 0 0 1 0 7.07"/>
                    </>
                ),
                volumeX: (
                    <>
                        <path d="M11 5 6 9H2v6h4l5 4V5z"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>
                    </>
                ),
                sparkles: <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>,
                star: <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            const [currentSlide, setCurrentSlide] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const [isAiLoading, setIsAiLoading] = useState(false);
            const audioRef = useRef(null);

            const tokens = {
                colors: { canvasWhite: "#FFFFFF", deepInk: "#0A1317", cobaltPrimary: "#0064E0", softCloud: "#F2F2F2" }
            };

            const [slideData, setSlideData] = useState([
                {
                    id: 1,
                    layout: 'hero-image',
                    bg: tokens.colors.deepInk,
                    color: tokens.colors.canvasWhite,
                    badge: '함께 만드는 우리 학교',
                    titleImage: 'KakaoTalk_20260504_111859834.png',
                    subhead: '우리가 직접 만들고 배우는\n반짝반짝 즐거운 축제 이야기',
                },
                {
                    id: 2,
                    layout: 'grid-1',
                    bg: tokens.colors.canvasWhite,
                    color: tokens.colors.deepInk,
                    badge: '맞춤 · 배움 · 나눔',
                    title: '우리의 약속!',
                    subhead: '선생님, 친구들과 함께 나에게 딱 맞는 공부를 즐겁게 해요.',
                    photos: [], 
                    photoDesc: '우리 반 친구들이 함께 찍은 단체 사진'
                },
                {
                    id: 3,
                    layout: 'grid-2',
                    bg: tokens.colors.canvasWhite,
                    color: tokens.colors.deepInk,
                    badge: '즐거운 활동 01',
                    title: '상상하고 만들고!',
                    subhead: '과학과 예술이 만나면? 상상하는 모든 것이 현실이 돼요.',
                    photos: [], 
                    photoDescs: ['창의 탐구 활동', '즐거운 실험']
                },
                {
                    id: 4,
                    layout: 'grid-4',
                    bg: tokens.colors.canvasWhite,
                    color: tokens.colors.deepInk,
                    badge: '즐거운 활동 02',
                    title: 'AI와 함께 뚝딱!',
                    subhead: '태블릿과 인공지능을 활용해 나만의 멋진 작품을 완성해요.',
                    photos: [], 
                    photoDescs: ['디지털 수업', 'AI 결과물', '집중하는 시간', '친구와 협력']
                },
                {
                    id: 5,
                    layout: 'hero',
                    bg: tokens.colors.deepInk,
                    color: tokens.colors.canvasWhite,
                    badge: '다음에 또 만나요',
                    title: '더 넓은 세상으로\n함께 나아가요!',
                    subhead: '언제나 스스로 생각하고 실천하는\n멋진 세움학교 어린이가 될게요!',
                }
            ]);

            const handleAiRewrite = async () => {
                setIsAiLoading(true);
                const currentContent = slideData[currentSlide];
                const promptText = `슬라이드: "${currentContent.title || currentContent.badge}", 내용: "${currentContent.subhead}". 초등학생 눈높이의 홍보 멘트로 밝고 따뜻하게 2줄 이내로 고쳐줘.`;
                const systemPromptText = "너는 초등학교 홍보 영상 작가야. 감성적이고 활기찬 문구를 작성해.";

                try {
                    const newText = await callGemini(promptText, systemPromptText);
                    if (newText) {
                        const updatedData = [...slideData];
                        updatedData[currentSlide].subhead = newText.trim();
                        setSlideData(updatedData);
                    }
                } catch (e) {
                    console.error("AI Error:", e);
                } finally {
                    setIsAiLoading(false);
                }
            };

            const nextSlide = () => setCurrentSlide((prev) => (prev + 1) % slideData.length);
            const prevSlide = () => setCurrentSlide((prev) => (prev - 1 + slideData.length) % slideData.length);

            const toggleMusic = () => {
                if (isPlaying) { audioRef.current.pause(); } 
                else { audioRef.current.play().catch(() => {}); }
                setIsPlaying(!isPlaying);
            };

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === 'ArrowRight' || e.key === ' ') nextSlide();
                    if (e.key === 'ArrowLeft') prevSlide();
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, []);

            const SchoolLogo = ({ size = "w-10 h-10" }) => (
                <div className={`${size} rounded-full bg-white flex items-center justify-center shadow-sm overflow-hidden border border-gray-100`}>
                    <img 
                        src="교포.png" 
                        alt="logo" 
                        className="w-4/5 h-4/5 object-contain school-logo-img" 
                        onError={(e) => { e.target.src = 'https://via.placeholder.com/100?text=S'; }} 
                    />
                </div>
            );

            const PhotoBox = ({ src, desc }) => (
                <div className="bg-[#F2F2F2] rounded-[24px] border border-dashed border-gray-200 flex flex-col items-center justify-center h-full w-full relative overflow-hidden group photo-box">
                    {src ? (
                        <img src={src} alt={desc} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" />
                    ) : (
                        <div className="flex flex-col items-center text-gray-300">
                            <Icon name="camera" size={32} className="mb-2" />
                            <p className="font-bold px-4 text-center text-[10px] opacity-40 uppercase tracking-tighter">{desc || "PHOTO AREA"}</p>
                        </div>
                    )}
                </div>
            );

            const renderSlide = (slide) => {
                const photos = slide.photos || [];
                switch (slide.layout) {
                    case 'hero-image':
                        return (
                            <div className="flex flex-col items-center justify-center h-full text-center p-8 fade-in">
                                <div className="mb-4">
                                    {/* 이미지 크기 70% 수준으로 조정 */}
                                    <img src={slide.titleImage} className="max-h-[420px] w-auto object-contain drop-shadow-2xl rounded-xl" />
                                </div>
                                <div className="bg-white/10 text-white px-4 py-1 rounded-full font-bold text-[11px] mb-3 tracking-widest uppercase">{slide.badge}</div>
                                <p className="text-[26px] font-light leading-relaxed opacity-70 whitespace-pre-line cursor-pointer" onClick={handleAiRewrite}>
                                    {slide.subhead} ✨
                                </p>
                            </div>
                        );
                    case 'hero':
                        return (
                            <div className="flex flex-col items-center justify-center h-full text-center p-12 fade-in">
                                <div className="mb-10 scale-125"><SchoolLogo size="w-16 h-16" /></div>
                                <div className="bg-white/10 text-white px-4 py-1 rounded-full font-bold text-[11px] mb-8 tracking-widest uppercase">{slide.badge}</div>
                                <h1 className="text-[64px] font-bold leading-[1.1] mb-6 whitespace-pre-line tracking-tighter">{slide.title}</h1>
                                <p className="text-[26px] font-light leading-relaxed opacity-70 whitespace-pre-line cursor-pointer" onClick={handleAiRewrite}>
                                    {slide.subhead} ✨
                                </p>
                            </div>
                        );
                    case 'grid-1':
                        return (
                            <div className="flex flex-col h-full p-10 pt-16 fade-in items-center">
                                <div className="mb-6 w-full max-w-[70%]">
                                    <div className="bg-[#0064E0] text-white px-3 py-0.5 rounded-full font-bold text-[10px] mb-2 w-fit tracking-wider uppercase">{slide.badge}</div>
                                    <h2 className="text-[26px] font-bold mb-1 tracking-tight">{slide.title}</h2>
                                    <p className="text-[15px] font-light text-gray-400 cursor-pointer" onClick={handleAiRewrite}>
                                        {slide.subhead} ✨
                                    </p>
                                </div>
                                {/* 사진 영역 70% 크기 조정 */}
                                <div className="w-[70%] h-[70%] min-h-0"><PhotoBox src={photos[0]} desc={slide.photoDesc} /></div>
                            </div>
                        );
                    case 'grid-2':
                        return (
                            <div className="flex flex-col h-full p-10 pt-16 fade-in items-center">
                                <div className="mb-6 w-full max-w-[75%]">
                                    <div className="bg-[#0064E0] text-white px-3 py-0.5 rounded-full font-bold text-[10px] mb-2 w-fit tracking-wider uppercase">{slide.badge}</div>
                                    <h2 className="text-[26px] font-bold mb-1 tracking-tight">{slide.title}</h2>
                                    <p className="text-[15px] font-light text-gray-400 cursor-pointer" onClick={handleAiRewrite}>
                                        {slide.subhead} ✨
                                    </p>
                                </div>
                                {/* 사진 그리드 영역 75% 크기 조정 */}
                                <div className="grid grid-cols-2 gap-6 w-[75%] h-[70%] min-h-0">
                                    <PhotoBox src={photos[0]} desc={slide.photoDescs?.[0]} />
                                    <PhotoBox src={photos[1]} desc={slide.photoDescs?.[1]} />
                                </div>
                            </div>
                        );
                    case 'grid-4':
                        return (
                            <div className="flex flex-col h-full p-10 pt-16 fade-in items-center">
                                <div className="mb-4 w-full max-w-[80%]">
                                    <div className="bg-[#0064E0] text-white px-3 py-0.5 rounded-full font-bold text-[10px] mb-1.5 w-fit tracking-wider uppercase">{slide.badge}</div>
                                    <h2 className="text-[22px] font-bold mb-1 tracking-tight">{slide.title}</h2>
                                    <p className="text-[13px] font-light text-gray-400 cursor-pointer" onClick={handleAiRewrite}>
                                        {slide.subhead} ✨
                                    </p>
                                </div>
                                {/* 사진 그리드 영역 80% 크기 조정 */}
                                <div className="grid grid-cols-2 grid-rows-2 gap-4 w-[80%] h-[75%] min-h-0">
                                    {[0,1,2,3].map(i => <PhotoBox key={i} src={photos[i]} desc={slide.photoDescs?.[i]} />)}
                                </div>
                            </div>
                        );
                    default: return null;
                }
            };

            return (
                <div className="flex flex-col items-center justify-center min-h-screen p-4">
                    <audio ref={audioRef} src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" loop />
                    
                    {/* 전체 캔버스 1280x720 (복구) */}
                    <div className="relative shadow-2xl overflow-hidden bg-[#0A1317] rounded-[32px] w-full max-w-[1280px] slide-aspect">
                        <div className="absolute top-8 left-10 z-50 flex items-center gap-4">
                            <SchoolLogo size="w-12 h-12" />
                            <div className={`flex flex-col ${slideData[currentSlide].bg === tokens.colors.deepInk ? 'text-white' : 'text-[#0A1317]'}`}>
                                <span className="font-bold text-[14px] leading-tight tracking-tight">동일중앙초등학교</span>
                                <span className="text-[9px] tracking-widest uppercase opacity-40 font-bold tracking-tighter">Seum School Festival</span>
                            </div>
                        </div>

                        {isAiLoading && <div className="absolute top-0 left-0 w-full h-1.5 ai-shimmer z-[60]" />}

                        <div style={{ backgroundColor: slideData[currentSlide].bg, color: slideData[currentSlide].color }} className="h-full">
                            {renderSlide(slideData[currentSlide])}
                        </div>
                    </div>

                    <div className="fixed bottom-10 flex items-center gap-4 bg-white/95 backdrop-blur-xl px-8 py-4 rounded-full shadow-2xl border border-white/20">
                        <button onClick={prevSlide} className="p-3 hover:bg-gray-100 rounded-full transition-all active:scale-90"><Icon name="left" size={24} className="text-black"/></button>
                        <div className="flex gap-2 px-4">
                            {slideData.map((_, i) => <div key={i} className={`h-2 rounded-full transition-all duration-500 ${i === currentSlide ? 'w-12 bg-[#0064E0]' : 'w-2 bg-gray-200'}`} />)}
                        </div>
                        <button onClick={nextSlide} className="p-3 hover:bg-gray-100 rounded-full transition-all active:scale-90"><Icon name="right" size={24} className="text-black"/></button>
                        <div className="w-[1px] h-8 bg-gray-200 mx-2" />
                        <button onClick={toggleMusic} className={`flex items-center gap-3 px-6 py-2 rounded-full font-bold text-sm transition-all ${isPlaying ? 'bg-[#0064E0] text-white' : 'bg-gray-100 text-black'}`}>
                            <Icon name={isPlaying ? "volume2" : "volumeX"} size={18} />
                            {isPlaying ? '음악 끄기' : '음악 켜기'}
                        </button>
                        <button className="bg-[#0A1317] text-white px-8 py-3 rounded-full font-bold text-sm flex items-center gap-2 active:scale-95" onClick={() => { if(!isPlaying) toggleMusic(); setCurrentSlide(0); }}>
                            <Icon name="play" size={16} /> START
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
