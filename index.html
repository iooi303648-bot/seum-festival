<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동일중앙초 세움학교 페스티벌 (무한 재생)</title>
    <!-- 라이브러리 로드 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; background-color: #F0F2F5; overflow: hidden; }
        .slide-aspect { aspect-ratio: 16 / 9; }
        .fade-in { animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(1.02); } to { opacity: 1; transform: scale(1); } }
        
        .school-logo-img { mix-blend-mode: multiply; filter: contrast(1.1) brightness(1.05); }

        .ai-shimmer {
            background: linear-gradient(90deg, #0064E0 0%, #4a90e2 50%, #0064E0 100%);
            background-size: 200% 100%;
            animation: ai-shimmer 1.5s infinite linear;
        }
        @keyframes ai-shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .photo-box {
            transition: all 0.5s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        
        /* 프로그레스 바 애니메이션 */
        .progress-bar {
            animation: progress linear infinite;
        }
        @keyframes progress { from { width: 0%; } to { width: 100%; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // Gemini API 설정 (필요시 채워넣기)
        const apiKey = ""; 

        const callGemini = async (prompt, systemInstruction = "") => {
            if(!apiKey) return prompt + " (API 키 필요)";
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemInstruction }] }
            };
            try {
                const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const result = await response.json();
                return result.candidates?.[0]?.content?.parts?.[0]?.text;
            } catch (error) {
                console.error("Gemini API Error", error); return null;
            }
        };

        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                left: <path d="m15 18-6-6 6-6"/>,
                right: <path d="m9 18 6-6-6-6"/>,
                play: <path d="m7 4 12 8-12 8V4z"/>,
                pause: <path d="M6 4h4v16H6zm8 0h4v16h-4z"/>,
                camera: <><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></>
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            const [currentSlide, setCurrentSlide] = useState(0);
            const [isAutoPlaying, setIsAutoPlaying] = useState(false); // 자동 재생 상태
            const [isAiLoading, setIsAiLoading] = useState(false);
            const audioRef = useRef(null);
            
            // 슬라이드 전환 시간 설정 (밀리초)
            const SLIDE_DURATION = 5000; 

            const tokens = {
                colors: { canvasWhite: "#FFFFFF", deepInk: "#0A1317", cobaltPrimary: "#0064E0", softCloud: "#F2F2F2" }
            };

            // ==========================================
            // 💡 구글 드라이브 사진 연동 영역 💡
            // ==========================================
            // 구글 드라이브 파일의 공유 링크에서 'id=' 뒷부분의 문자열만 아래 배열에 넣습니다.
            // (주의: 사진 파일 권한은 '링크가 있는 모든 사용자'로 설정되어야 합니다)
            const googleDriveImageIds = [
                "1jSgCEhHb5MoQWxRRXXWne-VI_pX-J1eo",
                "1p9z5kAlQ1C2FNLkFRHxfxtWxMejKYtcd",
                "1NPqtKMbqvihcV7T3_HOU9auck3Qtu-Sm",
                "1Sx7nqa8WKxrZJaRLyavqVagWn1z88w8M",
                "1-Sc7WPE3WTIjSnVg-Rf1r69D3meErdhT",
                "1pJeDw3QvtHjGkhuCdQc-phukoewocpw2",
                "18wsAQBbFSJ4B67BskGJFIfYTeN2aGtb_",
                "1zE5UZKssOUCHX6gexHQzMoTiLs5iRqdY",
                "17GCX9slXQMon4GzgvnfZVTzCJHwLcNa2",
                "1IQs_5C9ZCjvO1D-HykMTZXRUYN2DR66O",
                "1Y196iR48wo9NvIVDiHA95OtF26sn_DCg",
                "1n5gBHG0ImDANbzCAZiOrqBAt-ZPUWzjE",
                "1x9qNR3p4u_S4AOgTIUEIeUTjpxseOH_f",
                "1OFhgBB4VHN_u3-JaHDV8AOBhCOamNGGz",
                "1IuoxTjYT7yxh5CsdpCCwBbMyfWUIjnTJ",
                "1Du-SYJ6YMgk9rHG3oBxZTe5PPe-pK7A0",
                "1EH6wFayQW_bmHvYBJ2T_AYnakl8ZJaYB",
                "1DVQOUA11a-2rSZaRE5hisqWOwMENa8XW",
                "1I4HzuXnLL5U_kOOCjAZTYtP-OcHPotB7",
                "17i_IUETTV019gzMk1HJQEt8SXsj6z-C3",
                "10YCSVEUBws9F3IJoFiTCb-cgUN-eJVhf",
                "1JnYQ_VmqcUNmb2EcELbqpNvbGK4qBEy8",
                "1ez66USGSpksg-F60fJUNldCGaIv8fe_2",
                "1NwoQzqdkiawlagnU1BQHihv8Al3JqidC",
                "1VX4TIhVdNzEmZs8-oM9qkIiqhtsIwcwU",
                "1xJTQfigXzY5WNmLaKBwydJbKMy87zr4a",
                "1jzx0ENGawzOx0vXYmeiwSFVXgLGfi-b1",
                "1ajtlYKXAyAZaisKROd2uOcMOAs0b3Sp1",
                "111DM4LNlLJz9LhG4VR1TTYECkU1VKgFx",
                "1eYN2ValChN8-KYsa0eI_Q_sOUYlaCxHm",
                "148D-1S7SIpU1x5rDEh4HQO3KjkgCT_8q",
                "1QKwhyTVUB0rAF2-MQYrbMA1KcMYcsif7",
                "19oV2elXpQMjYF2Z0BO3jq1HXo4_J44sc",
                "1OnOcbkEwFgzKf9-D0inY5JFeX4QCgiK-",
                "1xCjNZ0PFjnaRQWJsnfgeeKw7PmrKBHDZ",
                "1r77AfRlWzqV-GBibsPJSc6f-TUbNOaAL",
                "1OCUafjEeXhPzFJEOducuKBDXLZ8xkCOc",
                "1a1USnEWH2QvV_i-V10LdUw1Z4nWMnvxg",
                "14WPxfON0PIon08NpDT0bdhp3ZnNyKBvF",
                "1FXm0Y8WpHjheULPtx0-KCw2mkk7OcrTp",
                "1SwKju1wgMWsrXHJWkmgsJe38XbX4-WFr",
                "1Zu3fcaw0Q9UBTG4FenkW70c6T9WHP2Ik",
                "1d91rbab9Sm2toi2jxlEodXxexyf8OmnB",
                "1PAtQMcqLNvxiBQa0-QsjxMtzGHBmb5-m",
                "1wu89ATsYtcIBbSaC8MKrf8MwROLVdgm8",
                "1bXi7NGKf86yZIilYFgWnEAYn6bF0xSOW",
                "1kV18hnHNfuBRb8mqoD1KWD_iemj-yP6S",
                "13Id2I30j-Bvizl27dOqQi5Smu056bfx7",
                "1locFnoygXwfgE3TIabl_H1ann19LGKfk",
                "1k8rsx0IqMDH-Ja5kNTnsM8dWup284ro7",
                "1IjtmU-qF3gIh93cdiUHe758L7kcxjoJV",
                "15nkX3qaEjEnGGPOT801RGjnsOl2jJcQR",
                "1XLjthZv3ddzj-NwCiR1J3bO6GLlW8N7U",
                "1OSbjsE3PzKd7yLfnUAW-g888IySeGTrF",
                "16jExikrUnXz2FbJluKbo-6uHHdjzFms9",
                "16keFi1ZPg0RZFc_SII_gB35N6lfwn9sM"
            ];

            // 구글 드라이브 ID를 이미지 URL로 변환하는 함수
            const getDriveImageUrl = (id) => `https://drive.google.com/uc?export=view&id=${id}`;

            // (테스트용) 실제 ID가 없으면 무작위 샘플 이미지 60장 생성
            const photoUrls = googleDriveImageIds.length > 0 
                ? googleDriveImageIds.map(getDriveImageUrl)
                : Array.from({ length: 60 }, (_, i) => `https://picsum.photos/seed/${i+100}/800/600`);

            // ==========================================
            // 슬라이드 데이터 동적 생성
            // ==========================================
            const slideData = useMemo(() => {
                const introSlides = [
                    {
                        id: 'intro',
                        layout: 'hero-image',
                        bg: tokens.colors.deepInk, color: tokens.colors.canvasWhite,
                        badge: '함께 만드는 우리 학교',
                        titleImage: 'KakaoTalk_20260504_111859834.png',
                        subhead: '우리가 직접 만들고 배우는\n반짝반짝 즐거운 축제 이야기',
                    }
                ];

                const outroSlides = [
                    {
                        id: 'outro',
                        layout: 'hero',
                        bg: tokens.colors.deepInk, color: tokens.colors.canvasWhite,
                        badge: '다음에 또 만나요',
                        title: '더 넓은 세상으로\n함께 나아가요!',
                        subhead: '언제나 스스로 생각하고 실천하는\n멋진 세움학교 어린이가 될게요!',
                    }
                ];

                // 60장의 사진을 4장씩 묶어 grid-4 슬라이드로 생성 (15개 슬라이드)
                const gallerySlides = [];
                for (let i = 0; i < photoUrls.length; i += 4) {
                    const chunk = photoUrls.slice(i, i + 4);
                    gallerySlides.push({
                        id: `gallery-${i}`,
                        layout: 'grid-4',
                        bg: tokens.colors.canvasWhite, color: tokens.colors.deepInk,
                        badge: `우리들의 추억 ${Math.floor(i/4) + 1}`,
                        title: '페스티벌 하이라이트',
                        subhead: '친구들과 함께한 즐거운 순간들',
                        photos: chunk,
                        photoDescs: ['즐거운 활동', '친구와 함께', '집중하는 시간', '멋진 결과물'] // 기본 설명
                    });
                }

                // 인트로 -> 갤러리 슬라이드(15장) -> 아웃트로 순서로 합침
                return [...introSlides, ...gallerySlides, ...outroSlides];
            }, [photoUrls]);

            // ==========================================
            // 무한 자동 재생 로직
            // ==========================================
            const nextSlide = () => setCurrentSlide((prev) => (prev + 1) % slideData.length);
            const prevSlide = () => setCurrentSlide((prev) => (prev - 1 + slideData.length) % slideData.length);

            useEffect(() => {
                let intervalId;
                if (isAutoPlaying) {
                    intervalId = setInterval(() => {
                        nextSlide();
                    }, SLIDE_DURATION);
                }
                return () => {
                    if (intervalId) clearInterval(intervalId);
                };
            }, [isAutoPlaying, slideData.length]);

            const toggleAutoPlay = () => {
                if (isAutoPlaying) {
                    audioRef.current.pause();
                } else {
                    audioRef.current.play().catch(() => console.log("Audio autoplay prevented"));
                }
                setIsAutoPlaying(!isAutoPlaying);
            };

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === 'ArrowRight' || e.key === ' ') nextSlide();
                    if (e.key === 'ArrowLeft') prevSlide();
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, []);

            // AI 문구 변경 기능
            const handleAiRewrite = async (index) => {
                setIsAiLoading(true);
                const currentContent = slideData[currentSlide];
                const promptText = `슬라이드: "${currentContent.title || currentContent.badge}", 내용: "${currentContent.subhead}". 초등학생 눈높이의 홍보 멘트로 밝고 따뜻하게 2줄 이내로 고쳐줘.`;
                try {
                    const newText = await callGemini(promptText, "초등학교 행사 홍보 작가입니다.");
                    if (newText) {
                        currentContent.subhead = newText.trim();
                        // 강제 리렌더링 (단순화를 위해)
                        setCurrentSlide(currentSlide);
                    }
                } catch (e) { console.error(e); }
                setIsAiLoading(false);
            };

            const SchoolLogo = ({ size = "w-10 h-10" }) => (
                <div className={`${size} rounded-full bg-white flex items-center justify-center shadow-sm overflow-hidden border border-gray-100`}>
                    <img src="교포.png" alt="logo" className="w-4/5 h-4/5 object-contain school-logo-img" onError={(e) => { e.target.src = 'https://via.placeholder.com/100?text=S'; }} />
                </div>
            );

            const PhotoBox = ({ src, desc }) => (
                <div className="bg-[#F2F2F2] rounded-[24px] border border-dashed border-gray-200 flex flex-col items-center justify-center h-full w-full relative overflow-hidden group photo-box">
                    {src ? (
                        <img src={src} alt={desc} className="w-full h-full object-cover transition-transform duration-[2000ms] group-hover:scale-110" loading="lazy" />
                    ) : (
                        <div className="flex flex-col items-center text-gray-300">
                            <Icon name="camera" size={32} className="mb-2" />
                            <p className="font-bold px-4 text-center text-[10px] opacity-40 uppercase tracking-tighter">{desc}</p>
                        </div>
                    )}
                </div>
            );

            const renderSlide = (slide) => {
                const photos = slide.photos || [];
                switch (slide.layout) {
                    case 'hero-image':
                        return (
                            <div key={slide.id} className="flex flex-col items-center justify-center h-full text-center p-8 pt-28 fade-in">
                                <div className="mb-4">
                                    <img src={slide.titleImage} className="max-h-[420px] w-auto object-contain drop-shadow-2xl rounded-xl" onError={(e) => { e.target.src = 'https://via.placeholder.com/600x400?text=TITLE+IMAGE'; }} />
                                </div>
                                <div className="bg-white/10 text-white px-4 py-1 rounded-full font-bold text-[11px] mb-3 tracking-widest uppercase">{slide.badge}</div>
                                <p className="text-[26px] font-light leading-relaxed opacity-70 whitespace-pre-line cursor-pointer" onClick={() => handleAiRewrite(currentSlide)}>{slide.subhead} ✨</p>
                            </div>
                        );
                    case 'hero':
                        return (
                            <div key={slide.id} className="flex flex-col items-center justify-center h-full text-center p-12 pt-28 fade-in">
                                <div className="mb-10 scale-125"><SchoolLogo size="w-16 h-16" /></div>
                                <div className="bg-white/10 text-white px-4 py-1 rounded-full font-bold text-[11px] mb-8 tracking-widest uppercase">{slide.badge}</div>
                                <h1 className="text-[64px] font-bold leading-[1.1] mb-6 whitespace-pre-line tracking-tighter">{slide.title}</h1>
                                <p className="text-[26px] font-light leading-relaxed opacity-70 whitespace-pre-line cursor-pointer" onClick={() => handleAiRewrite(currentSlide)}>{slide.subhead} ✨</p>
                            </div>
                        );
                    case 'grid-4':
                        return (
                            <div key={slide.id} className="flex flex-col h-full p-10 pt-28 fade-in items-center">
                                <div className="mb-4 w-full max-w-[85%] flex items-end justify-between">
                                    <div>
                                        <div className="bg-[#0064E0] text-white px-3 py-0.5 rounded-full font-bold text-[10px] mb-1.5 w-fit tracking-wider uppercase">{slide.badge}</div>
                                        <h2 className="text-[22px] font-bold mb-1 tracking-tight">{slide.title}</h2>
                                    </div>
                                    <p className="text-[13px] font-light text-gray-400 cursor-pointer text-right max-w-md" onClick={() => handleAiRewrite(currentSlide)}>{slide.subhead} ✨</p>
                                </div>
                                <div className="grid grid-cols-2 grid-rows-2 gap-4 w-[85%] h-[75%] min-h-0">
                                    {[0,1,2,3].map(i => <PhotoBox key={i} src={photos[i]} desc={slide.photoDescs?.[i]} />)}
                                </div>
                            </div>
                        );
                    default: return null;
                }
            };

            return (
                <div className="flex flex-col items-center justify-center min-h-screen p-4">
                    {/* BGM: 재생 시 루프됨 */}
                    <audio ref={audioRef} src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" loop />
                    
                    <div className="relative shadow-2xl overflow-hidden bg-[#0A1317] rounded-[32px] w-full max-w-[1280px] slide-aspect">
                        {/* 상단 로고 및 상태바 */}
                        <div className="absolute top-8 left-10 z-50 flex items-center gap-4">
                            <SchoolLogo size="w-12 h-12" />
                            <div className={`flex flex-col ${slideData[currentSlide].bg === tokens.colors.deepInk ? 'text-white' : 'text-[#0A1317]'}`}>
                                <span className="font-bold text-[14px] leading-tight tracking-tight">동일중앙초등학교</span>
                                <span className="text-[9px] tracking-widest uppercase opacity-40 font-bold tracking-tighter">Seum School Festival</span>
                            </div>
                        </div>

                        {/* 우측 상단 진행 상태 (60장 모드에 맞춰 숫자로 표시) */}
                        <div className={`absolute top-8 right-10 z-50 font-bold text-lg opacity-30 ${slideData[currentSlide].bg === tokens.colors.deepInk ? 'text-white' : 'text-black'}`}>
                            {currentSlide + 1} / {slideData.length}
                        </div>

                        {/* 자동 재생 프로그레스 바 */}
                        {isAutoPlaying && (
                            <div className="absolute top-0 left-0 w-full h-1 bg-white/10 z-[60]">
                                <div className="h-full bg-[#0064E0] progress-bar" style={{ animationDuration: `${SLIDE_DURATION}ms` }} key={currentSlide} />
                            </div>
                        )}
                        {isAiLoading && <div className="absolute top-0 left-0 w-full h-1.5 ai-shimmer z-[60]" />}

                        {/* 슬라이드 렌더링 영역 */}
                        <div style={{ backgroundColor: slideData[currentSlide].bg, color: slideData[currentSlide].color }} className="h-full">
                            {renderSlide(slideData[currentSlide])}
                        </div>
                    </div>

                    {/* 하단 컨트롤러 */}
                    <div className="fixed bottom-10 flex items-center gap-4 bg-white/95 backdrop-blur-xl px-8 py-4 rounded-full shadow-2xl border border-white/20">
                        <button onClick={prevSlide} className="p-3 hover:bg-gray-100 rounded-full transition-all active:scale-90"><Icon name="left" size={24} className="text-black"/></button>
                        
                        <button onClick={toggleAutoPlay} className={`w-12 h-12 flex items-center justify-center rounded-full transition-all ${isAutoPlaying ? 'bg-[#0064E0] text-white shadow-lg shadow-blue-500/30' : 'bg-gray-100 text-black hover:bg-gray-200'}`}>
                            <Icon name={isAutoPlaying ? "pause" : "play"} size={20} />
                        </button>
                        
                        <button onClick={nextSlide} className="p-3 hover:bg-gray-100 rounded-full transition-all active:scale-90"><Icon name="right" size={24} className="text-black"/></button>
                        
                        <div className="w-[1px] h-8 bg-gray-200 mx-2" />
                        
                        <button className={`px-8 py-3 rounded-full font-bold text-sm flex items-center gap-2 active:scale-95 transition-all ${isAutoPlaying ? 'bg-red-50 text-red-500' : 'bg-[#0A1317] text-white'}`} 
                                onClick={toggleAutoPlay}>
                            {isAutoPlaying ? '무한 재생 중지' : '무한 재생 시작'}
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
