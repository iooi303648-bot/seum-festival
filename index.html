<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동일중앙초 세움학교 페스티벌 (무한 재생)</title>
    <!-- 라이브러리 로드 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        body { font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; background-color: #000; overflow: hidden; }
        .slide-aspect { aspect-ratio: 16 / 9; }
        .fade-in { animation: fadeIn 1s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(1.05); } to { opacity: 1; transform: scale(1); } }
        
        .school-logo-img { mix-blend-mode: multiply; filter: contrast(1.1) brightness(1.05); }

        .ai-shimmer {
            background: linear-gradient(90deg, #0064E0 0%, #4a90e2 50%, #0064E0 100%);
            background-size: 200% 100%;
            animation: ai-shimmer 1.5s infinite linear;
        }
        @keyframes ai-shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .photo-box {
            transition: all 0.5s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        .progress-bar { animation: progress linear infinite; }
        @keyframes progress { from { width: 0%; } to { width: 100%; } }

        /* 영상 녹화 모드 시 마우스 커서 숨김 */
        .hide-cursor { cursor: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const apiKey = ""; 

        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                left: <path d="m15 18-6-6 6-6"/>,
                right: <path d="m9 18 6-6-6-6"/>,
                play: <path d="m7 4 12 8-12 8V4z"/>,
                pause: <path d="M6 4h4v16H6zm8 0h4v16h-4z"/>,
                camera: <><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></>,
                eyeOff: <><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></>,
                alert: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>
            };
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            const [currentSlide, setCurrentSlide] = useState(0);
            const [isAutoPlaying, setIsAutoPlaying] = useState(false);
            const [hideUI, setHideUI] = useState(false);
            const audioRef = useRef(null);
            
            const SLIDE_DURATION = 6000;

            const tokens = {
                colors: { canvasWhite: "#FFFFFF", deepInk: "#0A1317", cobaltPrimary: "#0064E0", softCloud: "#F2F2F2" }
            };

            const googleDriveImageIds = [
                "1jSgCEhHb5MoQWxRRXXWne-VI_pX-J1eo", "1p9z5kAlQ1C2FNLkFRHxfxtWxMejKYtcd", "1NPqtKMbqvihcV7T3_HOU9auck3Qtu-Sm",
                "1Sx7nqa8WKxrZJaRLyavqVagWn1z88w8M", "1-Sc7WPE3WTIjSnVg-Rf1r69D3meErdhT", "1pJeDw3QvtHjGkhuCdQc-phukoewocpw2",
                "18wsAQBbFSJ4B67BskGJFIfYTeN2aGtb_", "1zE5UZKssOUCHX6gexHQzMoTiLs5iRqdY", "17GCX9slXQMon4GzgvnfZVTzCJHwLcNa2",
                "1IQs_5C9ZCjvO1D-HykMTZXRUYN2DR66O", "1Y196iR48wo9NvIVDiHA95OtF26sn_DCg", "1n5gBHG0ImDANbzCAZiOrqBAt-ZPUWzjE",
                "1x9qNR3p4u_S4AOgTIUEIeUTjpxseOH_f", "1OFhgBB4VHN_u3-JaHDV8AOBhCOamNGGz", "1IuoxTjYT7yxh5CsdpCCwBbMyfWUIjnTJ",
                "1Du-SYJ6YMgk9rHG3oBxZTe5PPe-pK7A0", "1EH6wFayQW_bmHvYBJ2T_AYnakl8ZJaYB", "1DVQOUA11a-2rSZaRE5hisqWOwMENa8XW",
                "1I4HzuXnLL5U_kOOCjAZTYtP-OcHPotB7", "17i_IUETTV019gzMk1HJQEt8SXsj6z-C3", "10YCSVEUBws9F3IJoFiTCb-cgUN-eJVhf",
                "1JnYQ_VmqcUNmb2EcELbqpNvbGK4qBEy8", "1ez66USGSpksg-F60fJUNldCGaIv8fe_2", "1NwoQzqdkiawlagnU1BQHihv8Al3JqidC",
                "1VX4TIhVdNzEmZs8-oM9qkIiqhtsIwcwU", "1xJTQfigXzY5WNmLaKBwydJbKMy87zr4a", "1jzx0ENGawzOx0vXYmeiwSFVXgLGfi-b1",
                "1ajtlYKXAyAZaisKROd2uOcMOAs0b3Sp1", "111DM4LNlLJz9LhG4VR1TTYECkU1VKgFx", "1eYN2ValChN8-KYsa0eI_Q_sOUYlaCxHm",
                "148D-1S7SIpU1x5rDEh4HQO3KjkgCT_8q", "1QKwhyTVUB0rAF2-MQYrbMA1KcMYcsif7", "19oV2elXpQMjYF2Z0BO3jq1HXo4_J44sc",
                "1OnOcbkEwFgzKf9-D0inY5JFeX4QCgiK-", "1xCjNZ0PFjnaRQWJsnfgeeKw7PmrKBHDZ", "1r77AfRlWzqV-GBibsPJSc6f-TUbNOaAL",
                "1OCUafjEeXhPzFJEOducuKBDXLZ8xkCOc", "1a1USnEWH2QvV_i-V10LdUw1Z4nWMnvxg", "14WPxfON0PIon08NpDT0bdhp3ZnNyKBvF",
                "1FXm0Y8WpHjheULPtx0-KCw2mkk7OcrTp", "1SwKju1wgMWsrXHJWkmgsJe38XbX4-WFr", "1Zu3fcaw0Q9UBTG4FenkW70c6T9WHP2Ik",
                "1d91rbab9Sm2toi2jxlEodXxexyf8OmnB", "1PAtQMcqLNvxiBQa0-QsjxMtzGHBmb5-m", "1wu89ATsYtcIBbSaC8MKrf8MwROLVdgm8",
                "1bXi7NGKf86yZIilYFgWnEAYn6bF0xSOW", "1kV18hnHNfuBRb8mqoD1KWD_iemj-yP6S", "13Id2I30j-Bvizl27dOqQi5Smu056bfx7",
                "1locFnoygXwfgE3TIabl_H1ann19LGKfk", "1k8rsx0IqMDH-Ja5kNTnsM8dWup284ro7", "1IjtmU-qF3gIh93cdiUHe758L7kcxjoJV",
                "15nkX3qaEjEnGGPOT801RGjnsOl2jJcQR", "1XLjthZv3ddzj-NwCiR1J3bO6GLlW8N7U", "1OSbjsE3PzKd7yLfnUAW-g888IySeGTrF",
                "16jExikrUnXz2FbJluKbo-6uHHdjzFms9", "16keFi1ZPg0RZFc_SII_gB35N6lfwn9sM"
            ];

            const getDriveImageUrl = (id) => `https://drive.google.com/uc?export=view&id=${id}`;
            const photoUrls = googleDriveImageIds.map(getDriveImageUrl);

            const slideData = useMemo(() => {
                const intro = [{ id: 'intro', layout: 'hero-image', bg: tokens.colors.deepInk, color: tokens.colors.canvasWhite, badge: '함께 만드는 우리 학교', titleImage: 'KakaoTalk_20260504_111859834.png', subhead: '우리가 직접 만들고 배우는\n반짝반짝 즐거운 축제 이야기' }];
                const outro = [{ id: 'outro', layout: 'hero', bg: tokens.colors.deepInk, color: tokens.colors.canvasWhite, badge: '다음에 또 만나요', title: '더 넓은 세상으로\n함께 나아가요!', subhead: '언제나 스스로 생각하고 실천하는\n멋진 세움학교 어린이가 될게요!' }];
                const gallery = [];
                for (let i = 0; i < photoUrls.length; i += 4) {
                    gallery.push({ id: `gallery-${i}`, layout: 'grid-4', bg: tokens.colors.canvasWhite, color: tokens.colors.deepInk, badge: `우리들의 추억 ${Math.floor(i/4) + 1}`, title: '페스티벌 하이라이트', subhead: '친구들과 함께한 즐거운 순간들', photos: photoUrls.slice(i, i + 4), photoDescs: ['즐거운 활동', '친구와 함께', '집중하는 시간', '멋진 결과물'] });
                }
                return [...intro, ...gallery, ...outro];
            }, [photoUrls]);

            const nextSlide = () => setCurrentSlide((prev) => (prev + 1) % slideData.length);
            const prevSlide = () => setCurrentSlide((prev) => (prev - 1 + slideData.length) % slideData.length);

            useEffect(() => {
                let intervalId;
                if (isAutoPlaying) intervalId = setInterval(nextSlide, SLIDE_DURATION);
                return () => clearInterval(intervalId);
            }, [isAutoPlaying, slideData.length]);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === 'ArrowRight' || e.key === ' ') nextSlide();
                    if (e.key === 'ArrowLeft') prevSlide();
                    if (e.key === 'Escape') setHideUI(false);
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, []);

            const toggleAutoPlay = () => {
                if (isAutoPlaying) audioRef.current.pause();
                else audioRef.current.play().catch(() => {});
                setIsAutoPlaying(!isAutoPlaying);
            };

            const SchoolLogo = ({ size = "w-10 h-10" }) => (
                <div className={`${size} rounded-full bg-white flex items-center justify-center shadow-sm overflow-hidden border border-gray-100`}>
                    <img src="교포.png" alt="logo" className="w-4/5 h-4/5 object-contain school-logo-img" onError={(e) => { e.target.src = 'https://via.placeholder.com/100?text=S'; }} />
                </div>
            );

            // 이미지 로드 실패 시 대체 화면을 보여주는 개선된 PhotoBox
            const PhotoBox = ({ src, desc }) => {
                const [error, setError] = useState(false);

                return (
                    <div className="bg-[#F2F2F2] rounded-[24px] border border-dashed border-gray-300 flex flex-col items-center justify-center h-full w-full relative overflow-hidden photo-box">
                        {src && !error ? (
                            <img 
                                src={src} 
                                alt={desc} 
                                className="w-full h-full object-cover fade-in" 
                                loading="lazy" 
                                onError={() => setError(true)}
                            />
                        ) : (
                            <div className="flex flex-col items-center text-gray-400 p-4 text-center">
                                <Icon name={error ? "alert" : "camera"} size={32} className="mb-2 opacity-50" />
                                <p className="font-bold text-[11px] mb-1">{desc}</p>
                                {error && (
                                    <p className="text-[9px] text-red-400 font-medium">구글 드라이브 권한을<br/>'모든 사용자'로 변경해주세요</p>
                                )}
                            </div>
                        )}
                    </div>
                );
            };

            const renderSlide = (slide) => {
                const photos = slide.photos || [];
                const commonClass = "flex flex-col items-center justify-center h-full text-center fade-in";
                switch (slide.layout) {
                    case 'hero-image':
                        return (
                            <div key={slide.id} className={`${commonClass} p-8 pt-32`}>
                                <div className="mb-6"><img src={slide.titleImage} className="max-h-[380px] w-auto object-contain drop-shadow-2xl rounded-xl" /></div>
                                <div className="bg-white/10 text-white px-4 py-1 rounded-full font-bold text-[11px] mb-3 tracking-widest">{slide.badge}</div>
                                <p className="text-[26px] font-light opacity-70 whitespace-pre-line leading-relaxed">{slide.subhead} ✨</p>
                            </div>
                        );
                    case 'hero':
                        return (
                            <div key={slide.id} className={`${commonClass} p-12 pt-32`}>
                                <div className="mb-10 scale-125"><SchoolLogo size="w-16 h-16" /></div>
                                <div className="bg-white/10 text-white px-4 py-1 rounded-full font-bold text-[11px] mb-8 tracking-widest">{slide.badge}</div>
                                <h1 className="text-[64px] font-bold leading-[1.1] mb-6 whitespace-pre-line tracking-tight">{slide.title}</h1>
                                <p className="text-[26px] font-light opacity-70 whitespace-pre-line leading-relaxed">{slide.subhead} ✨</p>
                            </div>
                        );
                    case 'grid-4':
                        return (
                            <div key={slide.id} className="flex flex-col h-full p-10 pt-32 fade-in items-center">
                                <div className="mb-6 w-full max-w-[85%] flex items-end justify-between">
                                    <div className="text-left">
                                        <div className="bg-[#0064E0] text-white px-3 py-0.5 rounded-full font-bold text-[10px] mb-2 w-fit">{slide.badge}</div>
                                        <h2 className="text-[24px] font-bold mb-1 tracking-tight">{slide.title}</h2>
                                    </div>
                                    <p className="text-[14px] font-light text-gray-500 text-right max-w-md leading-snug">{slide.subhead} ✨</p>
                                </div>
                                <div className="grid grid-cols-2 grid-rows-2 gap-5 w-[85%] h-[70%] min-h-0">
                                    {[0,1,2,3].map(i => <PhotoBox key={i} src={photos[i]} desc={slide.photoDescs?.[i]} />)}
                                </div>
                            </div>
                        );
                    default: return null;
                }
            };

            return (
                <div className={`flex flex-col items-center justify-center min-h-screen p-4 ${hideUI ? 'hide-cursor' : ''}`}>
                    <audio ref={audioRef} src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" loop />
                    
                    <div className="relative shadow-2xl overflow-hidden bg-[#0A1317] rounded-[32px] w-full max-w-[1280px] slide-aspect">
                        {!hideUI && (
                            <div className="absolute top-8 left-10 z-50 flex items-center gap-4 transition-opacity duration-500">
                                <SchoolLogo size="w-12 h-12" />
                                <div className={`flex flex-col ${slideData[currentSlide].bg === tokens.colors.deepInk ? 'text-white' : 'text-[#0A1317]'}`}>
                                    <span className="font-bold text-[15px] tracking-tight">동일중앙초등학교</span>
                                    <span className="text-[10px] tracking-widest opacity-40 font-bold">Seum School Festival</span>
                                </div>
                            </div>
                        )}

                        {isAutoPlaying && !hideUI && (
                            <div className="absolute top-0 left-0 w-full h-1 bg-white/10 z-[60]">
                                <div className="h-full bg-[#0064E0] progress-bar" style={{ animationDuration: `${SLIDE_DURATION}ms` }} key={currentSlide} />
                            </div>
                        )}

                        <div style={{ backgroundColor: slideData[currentSlide].bg, color: slideData[currentSlide].color }} className="h-full">
                            {renderSlide(slideData[currentSlide])}
                        </div>
                    </div>

                    {!hideUI && (
                        <div className="fixed bottom-10 flex items-center gap-4 bg-white/95 backdrop-blur-xl px-8 py-4 rounded-full shadow-2xl border border-white/20 fade-in">
                            <button onClick={prevSlide} className="p-3 hover:bg-gray-100 rounded-full active:scale-90 transition-colors"><Icon name="left" size={24} className="text-black"/></button>
                            <button onClick={toggleAutoPlay} className={`w-12 h-12 flex items-center justify-center rounded-full transition-all ${isAutoPlaying ? 'bg-[#0064E0] text-white shadow-lg shadow-blue-500/30' : 'bg-gray-100 text-black hover:bg-gray-200'}`}>
                                <Icon name={isAutoPlaying ? "pause" : "play"} size={22} />
                            </button>
                            <button onClick={nextSlide} className="p-3 hover:bg-gray-100 rounded-full active:scale-90 transition-colors"><Icon name="right" size={24} className="text-black"/></button>
                            <div className="w-[1px] h-8 bg-gray-200 mx-2" />
                            <button className="bg-gray-800 text-white px-6 py-3 rounded-full font-bold text-sm flex items-center gap-2 hover:bg-black transition-colors" onClick={() => { if(!isAutoPlaying) toggleAutoPlay(); setHideUI(true); }}>
                                <Icon name="eyeOff" size={16} /> 녹화 모드 시작
                            </button>
                        </div>
                    )}

                    {hideUI && (
                        <div className="fixed bottom-4 text-white/30 text-xs font-light pointer-events-none">
                            Esc를 누르면 다시 메뉴가 나타납니다.
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
